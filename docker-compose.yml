services:
  juristic-app:
    build: .
    container_name: juristicperson-web
    ports:
      - "5010:5000"
    volumes:
      - .:/app
    restart: always
    # ใช้ env_file เพื่อดึงค่าจากไฟล์ .env ในโฟลเดอร์ปัจจุบัน
    env_file:
      - .env
    environment:
      - FLASK_APP=app.py
      - FLASK_DEBUG=1
      # ลบบรรทัด DATABASE_URL ออกจากที่นี่ เพราะมันจะไปอ่านจาก .env แทน
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: juristic-network
    external: true # ตั้งเป็น true หากคุณมี network ชื่อนี้รันอยู่แล้ว (เช่นจาก postgres-db)