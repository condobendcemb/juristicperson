version: '3.8'

services:
  juristic-app:
    build: .
    container_name: juristicperson-web
    ports:
      - "5010:5000"
    volumes:
      - .:/app
    restart: always
    environment:
      # จะดึงค่าจากไฟล์ .env (Supabase)
      - DATABASE_URL=${DATABASE_URL}
      - FLASK_APP=app.py
      - FLASK_DEBUG=1
      - SECRET_KEY=your-secret-key-here
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: juristic-network
