services:
  # Web Service for Juristic Person App
  - type: web
    name: juristic-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python init_db.py && gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: juristic_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_APP
        value: app.py
      - key: FLASK_DEBUG
        value: "false"

databases:
  # Managed PostgreSQL Database
  - name: juristic_db
    databaseName: juristic_db
    user: admincomp
    plan: free # Change to starter for production
