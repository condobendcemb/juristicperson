<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juristic SaaS | Login & Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --blue-gradient: linear-gradient(-45deg, #0f172a, #1e3c72, #2a5298);
            --reg-gradient: linear-gradient(-45deg, #1e1b4b, #312e81, #4338ca);
            --speed: 0.8s;
            --bezier: cubic-bezier(0.7, 0, 0.3, 1);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'Sarabun', sans-serif;
            overflow: hidden;
            background: linear-gradient(rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.4)),
                url('https://images.unsplash.com/photo-1449824913935-59a10b8d2000?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        .container-main {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
        }

        .info-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background: var(--blue-gradient);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
            transition: all var(--speed) var(--bezier);
            overflow: hidden;
        }

        .form-panel {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: all var(--speed) var(--bezier);
        }

        /* Mode Swapping */
        .register-mode .info-panel {
            left: 50%;
            background: var(--reg-gradient);
        }

        .register-mode .form-panel {
            left: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(25px) saturate(180%);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            transition: max-width 0.4s ease;
        }

        .register-mode .glass-card {
            max-width: 600px;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
        }

        .form-control:focus {
            background: #fff;
            border-color: #2563eb;
            box-shadow: none;
        }

        .btn-primary {
            background: #1e293b;
            border: none;
            font-weight: 700;
            padding: 12px;
        }

        .btn-success {
            background: #10b981;
            border: none;
            font-weight: 700;
            padding: 12px;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%
            }

            50% {
                background-position: 100% 50%
            }

            100% {
                background-position: 0% 50%
            }
        }

        @media (max-width: 992px) {
            .info-panel {
                display: none;
            }

            .form-panel {
                width: 100%;
                left: 0;
            }
        }
    </style>
</head>

<body>

    <div class="container-main" id="main-scene">
        <div class="info-panel">
            <div style="max-width: 400px; padding: 40px;">
                <div id="info-login">
                    <h1 class="display-4 fw-bold mb-3">ระบบบริหาร<br><span style="color:#22d3ee">นิติบุคคล</span></h1>
                    <p class="fs-5 opacity-75">จัดการโครงการแบบ Real-time ด้วยระบบ SaaS ที่มั่นคงที่สุด</p>
                </div>
                <div id="info-reg" class="hidden">
                    <h1 class="display-4 fw-bold mb-3 text-warning">เปิดโครงการ<br>ใหม่วันนี้</h1>
                    <p class="fs-5 opacity-75">รับฐานข้อมูลแยกส่วนเพื่อความปลอดภัยสูงสุดสำหรับนิติบุคคล</p>
                </div>
            </div>
        </div>

        <div class="form-panel">
            <div class="glass-card">
                <div id="div-login" class="form-content">
                    <h2 class="fw-bold mb-4">เข้าสู่ระบบ</h2>
                    <form id="form-login" action="/login" method="POST" onsubmit="return handleFormSubmit(this)">
                        <div class="mb-3">
                            <label class="small fw-bold">อีเมลผู้ใช้งาน</label>
                            <input type="email" name="email" class="form-control" placeholder="admin@mail.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="small fw-bold">รหัสผ่าน</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
                        <p class="text-center small mb-0">ยังไม่มีบัญชี? <a href="javascript:void(0)"
                                onclick="toggleMode(true)" class="fw-bold text-decoration-none">สมัครสมาชิก</a></p>
                    </form>
                </div>

                <div id="div-reg" class="form-content hidden">
                    <h2 class="fw-bold mb-1 text-primary">ลงทะเบียนนิติบุคคล</h2>
                    <p class="text-muted mb-4 small">สร้างฐานข้อมูลโครงการใหม่</p>
                    <form id="form-register" action="/register" method="POST" onsubmit="return handleFormSubmit(this)">
                        <div class="mb-3">
                            <label class="small fw-bold">ชื่อโครงการ / นิติบุคคล</label>
                            <input type="text" name="juristic_name" class="form-control" placeholder="หมู่บ้าน..."
                                required>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="small fw-bold text-primary">อีเมลผู้ดูแล</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="small fw-bold text-primary">รหัสผ่าน</label>
                                <input type="password" name="password" class="form-control" minlength="4" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100 mt-4">สร้างโครงการ</button>
                        <p class="text-center mt-3 small mb-0"><a href="javascript:void(0)" onclick="toggleMode(false)"
                                class="text-muted text-decoration-none"><i class="fas fa-arrow-left me-1"></i>
                                กลับไปเข้าสู่ระบบ</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        async function handleFormSubmit(form) {
            const btn = form.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> กำลังดำเนินการ...';

            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form)
                });
                const result = await response.json();

                if (result.success) {
                    // ถ้าเป็น Login สำเร็จให้ไปหน้าเลือกนิติ
                    if (form.id === 'form-login') {
                        Swal.fire({
                            icon: 'success',
                            title: 'สำเร็จ',
                            text: 'กำลังพาคุณไปหน้าเลือกนิติบุคคล...',
                            timer: 1500,
                            showConfirmButton: false,
                            willClose: () => { window.location.href = result.redirect; }
                        });
                    } else {
                        // ถ้าเป็น Register สำเร็จ
                        Swal.fire({
                            icon: 'success',
                            title: 'ลงทะเบียนสำเร็จ',
                            text: result.message,
                            confirmButtonText: 'ตกลง'
                        }).then(() => {
                            toggleMode(false); // สลับกลับไปหน้า Login
                            form.reset();
                        });
                        btn.disabled = false;
                        btn.innerHTML = originalText;
                    }
                } else {
                    Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: result.message });
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'การเชื่อมต่อขัดข้อง' });
                btn.disabled = false;
                btn.innerHTML = originalText;
            }

            // คืนค่า false เพื่อไม่ให้ Browser Refresh หน้า
            return false;
        }
    </script>
</body>

</html>
