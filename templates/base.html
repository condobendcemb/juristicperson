<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Juristic System{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; }
        .wrapper { display: flex; align-items: stretch; }
        #sidebar {
            min-width: 250px;
            max-width: 250px;
            min-height: 100vh;
            background: #2c3e50;
            color: #fff;
            transition: all 0.3s;
        }
        #sidebar .sidebar-header { padding: 20px; background: #1a252f; text-align: center; }
        #sidebar ul p { color: #fff; padding: 10px; }
        #sidebar ul li a {
            padding: 15px 20px;
            display: block;
            color: #adb5bd;
            text-decoration: none;
            transition: 0.3s;
        }
        #sidebar ul li a:hover { color: #fff; background: #34495e; }
        #sidebar ul li.active > a { color: #fff; background: #3498db; }
        #content { width: 100%; padding: 20px; }
        .navbar { background: #fff; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="wrapper">
        <nav id="sidebar">
            <div class="sidebar-header">
                <h4 class="mb-0">Juristic Admin</h4>
                <small class="text-info">{{ session.get('juristic_name', 'Management') }}</small>
            </div>

            <ul class="list-unstyled components">
                <li class="active">
                    <a href="{{ url_for('dashboard') }}"><i class="fas fa-home me-2"></i> หน้าหลัก (Dashboard)</a>
                </li>
                <li>
                    <a href="#"><i class="fas fa-door-open me-2"></i> จัดการห้องพัก</a>
                </li>
                <li>
                    <a href="#"><i class="fas fa-file-invoice-dollar me-2"></i> ใบแจ้งหนี้</a>
                </li>
                <li>
                    <a href="#"><i class="fas fa-users me-2"></i> ผู้อยู่อาศัย</a>
                </li>
                <hr class="mx-3 my-2 border-secondary">
                <li>
                    <a href="{{ url_for('select_juristic') }}"><i class="fas fa-exchange-alt me-2"></i> สลับนิติบุคคล</a>
                </li>
                <li>
                    <a href="{{ url_for('logout') }}" class="text-danger"><i class="fas fa-sign-out-alt me-2"></i> ออกจากระบบ</a>
                </li>
            </ul>
        </nav>

        <div id="content">
            <nav class="navbar navbar-expand-lg rounded shadow-sm mb-4">
                <div class="container-fluid">
                    <span class="navbar-brand mb-0 h1 text-primary">
                        {% block header %}{% endblock %}
                    </span>
                    <div class="d-flex align-items-center">
                        <span class="me-3 text-muted">Admin User</span>
                        <img src="https://ui-avatars.com/api/?name=Admin&background=random" class="rounded-circle" width="35">
                    </div>
                </div>
            </nav>

            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
