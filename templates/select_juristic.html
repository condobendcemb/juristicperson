<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เลือกนิติบุคคลที่ต้องการจัดการ | Juristic SaaS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; min-height: 100vh; display: flex; align-items: center; }
        .juristic-card {
            border: none;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(.25,.8,.25,1);
            cursor: pointer;
        }
        .juristic-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 14px 28px rgba(0,0,0,0.1), 0 10px 10px rgba(0,0,0,0.08) !important;
        }
        .icon-box {
            width: 80px; height: 80px;
            background: rgba(13, 110, 253, 0.1);
            color: #0d6efd;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; margin: 0 auto 20px;
        }
        .logout-btn { position: absolute; top: 20px; right: 20px; }
    </style>
</head>
<body>

    <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-danger logout-btn">
        <i class="fas fa-sign-out-alt me-2"></i>ออกจากระบบ
    </a>

    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold text-dark">ยินดีต้อนรับ, ผู้ดูแลระบบ</h1>
            <p class="text-muted lead">กรุณาเลือกนิติบุคคลที่คุณต้องการเข้าจัดการข้อมูลในขณะนี้</p>
        </div>

        <div class="row g-4 justify-content-center">
            {% for j in juristics %}
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow-sm juristic-card p-4 text-center">
                    <div class="card-body">
                        <div class="icon-box">
                            <i class="fas fa-building fa-2x"></i>
                        </div>
                        <h4 class="fw-bold mb-2">{{ j.name }}</h4>
                        <p class="text-muted small mb-4">รหัสนิติบุคคล: #{{ j.id }}</p>
                        <hr class="mb-4 opacity-50">
                        <a href="{{ url_for('juristic.choose_project', j_id=j.id) }}" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm">
                            เลือกจัดการนิตินี้ <i class="fas fa-arrow-right ms-2"></i>
                        </a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="text-center mt-5 text-muted small">
            <p>© 2026 Juristic Platform Solution - Powered by Ubuntu VPS</p>
        </div>
    </div>

</body>
</html>
